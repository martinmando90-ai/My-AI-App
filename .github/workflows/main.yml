name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Create Android Project
      run: |
        mkdir -p app/src/main/java/com/example/myaiapp
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.myaiapp">
            <application
                android:label="My AI App"
                android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                <activity android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        cat > app/src/main/java/com/example/myaiapp/MainActivity.kt << 'EOF'
        package com.example.myaiapp
        import android.os.Bundle
        import androidx.appcompat.app.AppCompatActivity
        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)
            }
        }
        EOF
        
        mkdir -p app/src/main/res/layout
        cat > app/src/main/res/layout/activity_main.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:gravity="center"
            android:background="#0a0a1a">
            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🤖 My AI Assistant"
                android:textColor="#4a90d9"
                android:textSize="28sp"
                android:textStyle="bold" />
            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Welcome!"
                android:textColor="#c0c0c0"
                android:layout_marginTop="16dp" />
        </LinearLayout>
        EOF
        
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <resources>
            <string name="app_name">My AI App</string>
        </resources>
        EOF
        
    - name: Download Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        export PATH=$PATH:$PWD/gradle-8.2/bin
        
    - name: Create build.gradle files
      run: |
        cat > build.gradle << 'EOF'
        buildscript {
            ext.kotlin_version = '1.9.20'
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.0'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
        
        cat > app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        apply plugin: 'kotlin-android'
        android {
            compileSdkVersion 34
            defaultConfig {
                applicationId "com.example.myaiapp"
                minSdkVersion 28
                targetSdkVersion 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                debug {
                    minifyEnabled false
                }
            }
        }
        dependencies {
            implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF
        
        cat > settings.gradle << 'EOF'
        include ':app'
        EOF
        
        cat > gradle.properties << 'EOF'
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
    - name: Build APK
      run: |
        export PATH=$PATH:$PWD/gradle-8.2/bin
        gradle assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
