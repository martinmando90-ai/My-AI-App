name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create Android Project Structure
      run: |
        # إنشاء المجلدات
        mkdir -p app/src/main/java/com/example/myaiapp
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/raw
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
    - name: Create Project build.gradle
      run: |
        cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "8.2.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.20" apply false
        }
        EOF
        
    - name: Create App build.gradle
      run: |
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        
        android {
            namespace = "com.example.myaiapp"
            compileSdk = 34
            
            defaultConfig {
                applicationId = "com.example.myaiapp"
                minSdk = 28
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
            
            buildFeatures {
                compose = true
            }
            
            composeOptions {
                kotlinCompilerExtensionVersion = "1.5.8"
            }
            
            kotlinOptions {
                jvmTarget = "1.8"
            }
        }
        
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
            implementation("androidx.activity:activity-compose:1.8.2")
            implementation(platform("androidx.compose:compose-bom:2024.02.00"))
            implementation("androidx.compose.ui:ui")
            implementation("androidx.compose.material3:material3")
            implementation("androidx.compose.material:material-icons-extended")
            implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")
        }
        EOF
        
    - name: Create settings.gradle
      run: |
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "MyAIApp"
        include(":app")
        EOF
        
    - name: Create Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        networkTimeout=10000
        validateDistributionUrl=true
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        # تحميل Gradle Wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
        
    - name: Create gradlew
      run: |
        cat > gradlew << 'EOF'
        #!/bin/sh
        exec "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"
        EOF
        chmod +x gradlew
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
